<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Tic Tac Toe — Board Game Arena</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <div class="page">

    <a href="../index.html" class="back-link">← Board Game Arena</a>

    <header>
      <div class="ornament">
        <div class="ornament-line"></div>
        <div class="ornament-diamond"></div>
        <div class="ornament-line"></div>
      </div>
      <h1>Tic Tac Toe</h1>
      <p class="subtitle">X vs O</p>
    </header>

    <!-- Mode Selector -->
    <div class="mode-selector">
      <button class="mode-btn active" data-mode="pvp" onclick="setMode('pvp')">👥 Player vs Player</button>
      <button class="mode-btn" data-mode="ai" onclick="setMode('ai')">🤖 Player vs AI</button>
    </div>

    <!-- Difficulty (only visible in AI mode) -->
    <div class="difficulty-selector" id="difficultyRow" style="display:none">
      <button class="diff-btn active" data-diff="easy" onclick="setDifficulty('easy')">Easy</button>
      <button class="diff-btn" data-diff="hard" onclick="setDifficulty('hard')">Hard</button>
    </div>

    <!-- Status Bar -->
    <div class="status-bar" id="statusBar">
      <div class="status-icon"></div>
      <span id="statusText">X's turn</span>
      <span class="turn-badge" id="turnBadge">X</span>
    </div>

    <!-- Board -->
    <div class="board-frame">
      <div class="board" id="board"></div>
    </div>

    <!-- Thinking indicator -->
    <div class="thinking" id="thinking">
      <div class="thinking-dots"><span></span><span></span><span></span></div>
      <span>AI is thinking...</span>
    </div>

    <!-- Controls -->
    <div class="controls">
      <button class="btn btn-primary" onclick="restartGame()">↻ Restart</button>
      <button class="btn" onclick="resetScores()">✕ Reset Score</button>
    </div>

    <!-- Starter selector -->
    <div class="starter-row">
      <span>Starts:</span>
      <label><input type="radio" name="starter" value="X" checked onchange="changeStarter('X')"> X</label>
      <label><input type="radio" name="starter" value="O" onchange="changeStarter('O')"> O</label>
    </div>

    <!-- Scoreboard -->
    <div class="scoreboard">
      <div class="score-side">
        <div class="score-label">X — Wins</div>
        <div class="score-value" id="scoreX">0</div>
      </div>
      <div class="score-draws">
        <div class="draws-label">Draws</div>
        <div class="draws-value" id="scoreD">0</div>
      </div>
      <div class="score-side">
        <div class="score-label">O — Wins</div>
        <div class="score-value" id="scoreO">0</div>
      </div>
    </div>

    <footer>Board Game Arena — Tic Tac Toe · Minimax AI</footer>

  </div>

  <script src="js/app.js"></script>

</body>
</html>
